<section class="detail-grid">
    <div class="detail-card">
        <div class="section-header compact">
            <p>秘境降魔</p>
            <h2>秘境频道</h2>
        </div>
        
        <div class="dungeon-composer-sticky">
            <form class="dungeon-composer-form" method="post" action="/runtime/commands/send-raw">
                <input type="hidden" name="chat_id" value="{{ bound_chat_id or '' }}">
                <input type="hidden" name="thread_id" value="{{ selected_dungeon.thread_id or '' }}">
                <input type="hidden" name="chat_type" value="{{ bound_chat_type or 'group' }}">
                <input type="hidden" name="bot_username" value="{{ bound_bot_username or 'fanrenxiuxian_bot' }}">
                <input type="hidden" name="redirect_to" value="/modules/dungeon?dungeon_key={{ selected_dungeon.key }}">
                
                <input class="dungeon-command-input" type="text" name="text" placeholder="输入阵法指令 (如: .进入秘境) ..." required>
                <button type="submit" class="button" {% if not command_chat_ready %}disabled{% endif %}>发送</button>
            </form>
        </div>

        <div id="dungeon-feed-list" class="dungeon-feed-list top-gap">
            <p class="muted">正在感应秘境灵力波动...</p>
        </div>
    </div>
</section>

<script>
const initialDungeonMessages = {{ dungeon_messages | tojson }};
const dungeonFeedApiUrl = {{ ('/api/dungeon-feed?dungeon_key=' ~ selected_dungeon.key ~ (('&chat_id=' ~ bound_chat_id) if bound_chat_id else '')) | tojson }};
let dungeonFeedSignature = '';
let dungeonFeedTimer = null;

function buildDungeonFeedSignature(messages) {
    return JSON.stringify((messages || []).map(message => [
        message.message_id,
        message.created_at,
        message.text,
        message.reply_preview
    ]));
}

function createDungeonFeedItem(message) {
    const article = document.createElement('article');
    article.className = "dungeon-feed-item ";

    const meta = document.createElement('div');
    meta.className = 'dungeon-feed-meta';

    const sender = document.createElement('strong');
    sender.textContent = message.sender_display || (message.is_bot ? '天道傀儡' : '散修道友');
    meta.appendChild(sender);

    const time = document.createElement('span');
    time.className = 'muted';
    time.textContent = message.created_at_display || '-';
    meta.appendChild(time);
    article.appendChild(meta);

    if (message.reply_preview) {
        const replyPreview = document.createElement('div');
        replyPreview.className = 'dungeon-reply-preview';
        replyPreview.textContent = "传音回复：";
        article.appendChild(replyPreview);
    }

    const body = document.createElement('pre');
    body.className = 'message-text dungeon-feed-text';
    body.textContent = message.text || '';
    article.appendChild(body);
    return article;
}

function renderDungeonFeed(messages) {
    const container = document.getElementById('dungeon-feed-list');
    if (!container) {
        return;
    }
    container.innerHTML = '';
    if (!messages || !messages.length) {
        const empty = document.createElement('p');
        empty.className = 'muted';
        empty.textContent = '当前秘境寂静无声，尚未有神识波动。';
        container.appendChild(empty);
        return;
    }
    messages.forEach(message => {
        container.appendChild(createDungeonFeedItem(message));
    });
}

async function refreshDungeonFeed() {
    if (!dungeonFeedApiUrl) {
        return;
    }
    try {
        const response = await fetch(dungeonFeedApiUrl, {
            headers: { Accept: 'application/json' },
            cache: 'no-store'
        });
        if (!response.ok) {
            return;
        }
        const payload = await response.json();
        const messages = Array.isArray(payload.messages) ? payload.messages : [];
        const nextSignature = buildDungeonFeedSignature(messages);
        if (nextSignature === dungeonFeedSignature) {
            return;
        }
        dungeonFeedSignature = nextSignature;
        renderDungeonFeed(messages);
    } catch (_error) {
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (!document.getElementById('dungeon-feed-list')) {
        return;
    }
    renderDungeonFeed(initialDungeonMessages);
    dungeonFeedSignature = buildDungeonFeedSignature(initialDungeonMessages);
    dungeonFeedTimer = window.setInterval(refreshDungeonFeed, 5000);
});

window.addEventListener('beforeunload', () => {
    if (dungeonFeedTimer) {
        window.clearInterval(dungeonFeedTimer);
    }
});
</script>
