<section class="detail-grid">
    <div class="detail-card">
        <div class="section-header compact">
            <p>随身物品</p>
            <h2>本命法宝与储物袋</h2>
        </div>
        <div class="stack-list">
            <div class="kv-row"><span>已炼器图纸</span><strong>{{ recipes_known_text }}</strong></div>
            <div class="kv-row"><span>已掌握阵法</span><strong>{{ formations_known_text }}</strong></div>
            <div class="kv-row"><span>已领悟功法</span><strong>{{ learned_techniques_text }}</strong></div>
            <div class="kv-row"><span>当前携带法宝</span><strong style="color: var(--warning);">{{ equipped_artifact_name or '未装备法宝' }}</strong></div>
        </div>
        <div class="top-gap" style="display: flex; gap: 8px;">
            <button class="button" onclick="openCraftRecipe()">炼制法宝 / 丹药</button>
        </div>
    </div>
</section>

<dialog id="craft-recipe-modal" class="modal">
    <div class="modal-content detail-card" style="width: 480px; max-width: 90vw; margin: auto; border-radius: 8px;">
        <div class="section-header compact">
            <p id="craft-modal-subtitle">炼制图纸</p>
            <h2 id="craft-modal-title">生成炼制指令</h2>
        </div>
        <form class="form-grid top-gap" method="post" action="/runtime/commands/send-raw" id="craft-recipe-form">
            <input type="hidden" name="chat_id" value="{{ bound_chat_id or '' }}">
            <input type="hidden" name="thread_id" value="{{ bound_thread_id or '' }}">
            <input type="hidden" name="chat_type" value="{{ bound_chat_type or 'group' }}">
            <input type="hidden" name="bot_username" value="{{ bound_bot_username or 'fanrenxiuxian_bot' }}">
            <input type="hidden" name="redirect_to" value="/modules/inventory">
            <label class="full-span">
                炼制物品
                <select id="craft-item-select">
                    {% for entry in recipes_known_entries %}
                    <option value="{{ entry.craft_name or entry.name }}">{{ entry.craft_name or entry.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                数量
                <input type="number" id="craft-quantity" min="1" value="1">
            </label>
            <label class="full-span">
                生成指令
                <input id="craft-command-input" name="text" required>
            </label>
            <p class="muted full-span">标准格式：.炼制 物品名*数量。命令会自动去掉丹方、图纸字样，数量始终必填。</p>
            {% if not command_chat_ready %}
            <p class="muted full-span">当前未绑定有效游戏群，无法直接发送命令。</p>
            {% endif %}
            <div class="action-row full-span">
                <button type="submit" {% if not command_chat_ready %}disabled{% endif %}>立即发送指令</button>
                <button type="button" class="inline-button" onclick="document.getElementById('craft-recipe-modal').close()">取消</button>
            </div>
        </form>
    </div>
</dialog>

<script>
function updateCraftCommand() {
    const itemSelect = document.getElementById('craft-item-select');
    const quantityInput = document.getElementById('craft-quantity');
    const commandInput = document.getElementById('craft-command-input');
    if (!itemSelect || !quantityInput || !commandInput) {
        return;
    }
    const craftName = (itemSelect.value || '').trim();
    const quantity = Math.max(parseInt(quantityInput.value || '1', 10) || 1, 1);
    commandInput.value = .炼制 *;
}

function openCraftRecipe(recipeName, craftName) {
    const modal = document.getElementById('craft-recipe-modal');
    const title = document.getElementById('craft-modal-title');
    const subtitle = document.getElementById('craft-modal-subtitle');
    const itemSelect = document.getElementById('craft-item-select');
    const quantityInput = document.getElementById('craft-quantity');
    if (!modal || !itemSelect || !quantityInput) {
        return;
    }
    subtitle.textContent = recipeName ? "已掌握图纸：" : '炼制图纸';
    title.textContent = craftName ? "炼制 " : '生成炼制指令';
    if (craftName) {
        itemSelect.value = craftName;
    }
    quantityInput.value = 1;
    updateCraftCommand();
    modal.showModal();
}

document.getElementById('craft-item-select')?.addEventListener('change', updateCraftCommand);
document.getElementById('craft-quantity')?.addEventListener('input', updateCraftCommand);
document.addEventListener('DOMContentLoaded', updateCraftCommand);
</script>
